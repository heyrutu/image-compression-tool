{% extends "base.html" %}
{% block title %}Create account — ExtroComp{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="wrap auth-wrap">
    <form class="auth-card" method="POST" action="{{ url_for('register') }}" novalidate>
      <p class="eyebrow">Get started</p>
      <h1>Create your account</h1>

      <label for="username">Username</label>
      <input type="text" id="username" name="username" value="{{ username or '' }}" required autofocus>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ email or '' }}" autocomplete="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="new-password" minlength="6" required>
      <p class="field-hint">At least 6 characters.</p>

      <label for="confirm_password">Confirm password</label>
      <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" minlength="6" required>

      <button type="submit" class="btn btn-primary btn-block">Create account</button>

      <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </form>
  </div>
</section>
{% endblock %}
