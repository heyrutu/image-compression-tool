{% extends "base.html" %}
{% block title %}Log in — ExtroComp{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="wrap auth-wrap">
    <form class="auth-card" method="POST" action="{{ url_for('login') }}" novalidate>
      <p class="eyebrow">Welcome back</p>
      <h1>Log in</h1>

      <label for="identifier">Username or email</label>
      <input type="text" id="identifier" name="identifier" autocomplete="username" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit" class="btn btn-primary btn-block">Log in</button>

      <p class="auth-switch">No account yet? <a href="{{ url_for('register') }}">Create one</a></p>
    </form>
  </div>
</section>
{% endblock %}
